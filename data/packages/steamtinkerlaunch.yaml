name: steamtinkerlaunch
type: source
skip_clone: true
depends:
  - yad
checks:
  - curl
  - gawk
  - jq
version_cmd: curl -sL https://raw.githubusercontent.com/sonic2kk/steamtinkerlaunch/master/steamtinkerlaunch | sed -n 's/^PROGVERS="\(.*\)"/\1/p'
post_install: |
  set -eu
  apt-get install -y bash procps unzip wget xdotool x11-utils x11-xserver-utils xxd xdg-utils
  VERSION=$(curl -sL https://raw.githubusercontent.com/sonic2kk/steamtinkerlaunch/master/steamtinkerlaunch | sed -n 's/^PROGVERS="\(.*\)"/\1/p')
  TMPDIR=$(mktemp -d)
  curl -sL "https://api.github.com/repos/sonic2kk/steamtinkerlaunch/tarball/master" | tar -xz --strip-components=1 -C "$TMPDIR"
  cd "$TMPDIR"
  install -Dm755 steamtinkerlaunch -t /usr/bin
  install -d /usr/share/steamtinkerlaunch
  cp -r collections eval guicfgs lang misc /usr/share/steamtinkerlaunch
  install -Dm644 README.md -t /usr/share/doc/steamtinkerlaunch
  install -Dm644 misc/steamtinkerlaunch.desktop -t /usr/share/applications
  install -Dm644 misc/steamtinkerlaunch.svg -t /usr/share/icons/hicolor/scalable/apps
  echo "$VERSION" > /usr/share/steamtinkerlaunch/installed-version
  steamtinkerlaunch yad "$(command -v yad)" 2>/dev/null || true
  gtk-update-icon-cache -ftq /usr/share/icons/hicolor 2>/dev/null || true
  update-desktop-database -q /usr/share/applications 2>/dev/null || true
  rm -rf "$TMPDIR"
post_remove: |
  rm -f /usr/bin/steamtinkerlaunch
  rm -rf /usr/share/steamtinkerlaunch /usr/share/doc/steamtinkerlaunch
  rm -f /usr/share/applications/steamtinkerlaunch.desktop
  rm -f /usr/share/icons/hicolor/scalable/apps/steamtinkerlaunch.svg
