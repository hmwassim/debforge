name: protontricks
type: source
skip_clone: true
checks:
  - pipx
version_cmd: sudo -u "$SUDO_USER" pipx list --short 2>/dev/null | grep "^protontricks " | awk '{print $2}' | tr -d '()'
post_install: |
  set -e
  apt-get install -y pipx winetricks zenity
  sudo -u "$SUDO_USER" pipx install --force protontricks
  apps_dir="$(sudo -u "$SUDO_USER" sh -c 'echo "$HOME"')/.local/share/applications"
  venv_share="$(sudo -u "$SUDO_USER" sh -c 'echo "$HOME"')/.local/share/pipx/venvs/protontricks/share/applications"
  mkdir -p "$apps_dir"
  for f in protontricks.desktop protontricks-launch.desktop; do
    ln -sf "$venv_share/$f" "$apps_dir/$f"
  done
  update-desktop-database "$apps_dir" 2>/dev/null || true
post_remove: |
  sudo -u "$SUDO_USER" pipx uninstall protontricks
  apps_dir="$(sudo -u "$SUDO_USER" sh -c 'echo "$HOME"')/.local/share/applications"
  rm -f "$apps_dir/protontricks.desktop" "$apps_dir/protontricks-launch.desktop"
  update-desktop-database "$apps_dir" 2>/dev/null || true
