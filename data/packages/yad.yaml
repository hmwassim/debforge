name: yad
type: source
skip_clone: true
checks:
  - curl
version_cmd: "curl -sL https://api.github.com/repos/v1cont/yad/releases/latest | sed -n 's/.*\"tag_name\": *\"v\\([^\"]*\\)\".*/\\1/p'"
post_install: |
  set -eu
  apt-get update -qq
  apt-get install -y yad
  apt-get install -y -qq build-essential autoconf automake libtool pkg-config intltool libgtk-3-dev libwebkit2gtk-4.1-dev libgspell-1-dev libgtksourceview-3.0-dev gettext
  VERSION=$(curl -sL https://api.github.com/repos/v1cont/yad/releases/latest | sed -n 's/.*"tag_name": *"v\([^"]*\)".*/\1/p')
  TARBALL_URL=$(curl -sL https://api.github.com/repos/v1cont/yad/releases/latest | sed -n 's/.*"browser_download_url": *"\([^"]*\)".*/\1/p')
  TMPDIR=$(mktemp -d)
  curl -sL "$TARBALL_URL" | tar -xJ -C "$TMPDIR"
  cd "$TMPDIR/yad-${VERSION}"
  ./configure --prefix=/usr/local
  make -j"$(nproc)"
  make install
  mkdir -p /usr/local/share/yad
  echo "$VERSION" > /usr/local/share/yad/installed-version
  gtk-update-icon-cache -ftq /usr/local/share/icons/hicolor 2>/dev/null || true
  update-desktop-database -q /usr/local/share/applications 2>/dev/null || true
  glib-compile-schemas /usr/local/share/glib-2.0/schemas 2>/dev/null || true
  rm -rf "$TMPDIR"
post_remove: |
  rm -f /usr/local/bin/yad /usr/local/bin/yad-tools /usr/local/bin/yad-icon-browser /usr/local/bin/yad-settings
  rm -rf /usr/local/share/yad /usr/local/share/doc/yad
  find /usr/local/share/locale -name 'yad.mo' -exec rm -f {} +
  find /usr/local/share/icons/hicolor -name 'yad.png' -exec rm -f {} +
  rm -f /usr/local/share/applications/yad-icon-browser.desktop /usr/local/share/applications/yad-settings.desktop
  rm -f /usr/local/share/man/man1/yad.1 /usr/local/share/man/man1/yad-tools.1
  rm -f /usr/local/share/aclocal/yad.m4 /usr/local/share/pkgconfig/yad.pc /usr/local/share/glib-2.0/schemas/yad.gschema.xml
