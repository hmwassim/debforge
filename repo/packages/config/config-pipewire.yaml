name: config-pipewire
description: PipeWire audio system configuration
type: config
category: system
install:
  configs:
    /etc/modprobe.d/99-audio-disable-powersave.conf: 99-audio-disable-powersave.conf
    /etc/security/limits.d/20-audio.conf: 20-audio.conf
  user_configs:
    ~/.config/wireplumber/wireplumber.conf.d/51-disable-suspend.conf: 51-disable-suspend.conf
    ~/.config/wireplumber/wireplumber.conf.d/52-deprioritize-hdmi.conf: 52-deprioritize-hdmi.conf
    ~/.config/pipewire/pipewire.conf.d/10-clock.conf: 10-clock.conf
    ~/.config/pipewire/pipewire-pulse.conf.d/10-pulse.conf: 10-pulse.conf
