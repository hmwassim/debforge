name: nf-jetbrains-mono
description: JetBrains Mono Nerd Font
type: source
install:
  repo: https://github.com/ryanoasis/nerd-fonts.git
  skip_clone: true
  tag_prefix: v
  url: https://github.com/ryanoasis/nerd-fonts/releases/download/v{version}/JetBrainsMono.zip
  install: |
    mkdir -p /usr/local/share/fonts/nerdfont/JetBrainsMono
    cp *.ttf /usr/local/share/fonts/nerdfont/JetBrainsMono/
    fc-cache -f
remove:
  script: |
    rm -rf /usr/local/share/fonts/nerdfont/JetBrainsMono
    fc-cache -f
