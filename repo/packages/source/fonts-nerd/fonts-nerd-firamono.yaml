name: fonts-nerd-firamono
description: Fira Mono Nerd Font
type: source
category: fonts
install:
  repo: https://github.com/ryanoasis/nerd-fonts.git
  skip_clone: true
  tag_prefix: v
  url: https://github.com/ryanoasis/nerd-fonts/releases/download/v{version}/FiraMono.zip
  install: |
    mkdir -p /usr/local/share/fonts/fonts-nerd/FiraMono
    cp *.ttf /usr/local/share/fonts/fonts-nerd/FiraMono/
    fc-cache -f
remove:
  script: |
    rm -rf /usr/local/share/fonts/fonts-nerd/FiraMono
    fc-cache -f
