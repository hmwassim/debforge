name: protontricks
description: A simple wrapper for running Winetricks commands for Proton-enabled games
type: source
install:
  url: https://github.com/Matoking/protontricks/archive/refs/tags/{version}.tar.gz
  packages:
    - python3
    - python3-setuptools
    - python3-wheel
    - python3-setuptools-scm
    - python3-vdf
    - python3-pil
    - desktop-file-utils
  install: |
    SETUPTOOLS_SCM_PRETEND_VERSION={version} python3 setup.py install --prefix=/usr/local
    protontricks-desktop-install
  postinstall: |
    update-desktop-database -q ~/.local/share/applications 2>/dev/null || true
remove:
  script: |
    rm -f ~/.local/share/applications/protontricks.desktop
    rm -f ~/.local/share/applications/protontricks-launch.desktop
    update-desktop-database -q ~/.local/share/applications 2>/dev/null || true
