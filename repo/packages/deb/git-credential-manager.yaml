name: git-credential-manager
description: Git Credential Manager - secure Git credential helper
type: deb
category: development
package: gcm
install:
  url: https://github.com/git-ecosystem/git-credential-manager/releases/download/v{version}/gcm-linux-x64-{version}.deb
post_install: |
  if [ -n "$SUDO_USER" ]; then
    sudo -u "$SUDO_USER" git-credential-manager configure
    sudo -u "$SUDO_USER" git config --global credential.credentialStore secretservice
  else
    git-credential-manager configure
    git config --global credential.credentialStore secretservice
  fi
post_remove: |
  if [ -n "$SUDO_USER" ]; then
    sudo -u "$SUDO_USER" git-credential-manager unconfigure
  else
    git-credential-manager unconfigure
  fi
