name: github-desktop
type: deb
package: github-desktop
version_cmd: curl -sL "https://github.com/shiftkey/desktop/releases" | grep -o 'href="/shiftkey/desktop/releases/tag/release-[^"]*' | sed 's|.*/release-||' | sort -V | tail -1
install:
  url: https://github.com/shiftkey/desktop/releases/download/release-{version}/GitHubDesktop-linux-amd64-{version}.deb
