name: github-desktop
type: deb
package: github-desktop
version_cmd: git ls-remote --tags https://github.com/shiftkey/desktop.git | grep -oP 'release-\K\S+' | sort -V | tail -1
install:
  url: https://github.com/shiftkey/desktop/releases/download/release-{version}/GitHubDesktop-linux-amd64-{version}.deb
