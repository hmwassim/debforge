name: cursor
description: Cursor AI code editor
type: apt
install:
  packages:
    - cursor
preinstall: |
  mkdir -p /etc/apt/keyrings
  curl -fsSL https://downloads.cursor.com/keys/anysphere.asc \
    | gpg --dearmor \
    | tee /etc/apt/keyrings/cursor.gpg > /dev/null
  chmod 644 /etc/apt/keyrings/cursor.gpg
  tee /etc/apt/sources.list.d/cursor.sources > /dev/null <<EOF
  Types: deb
  URIs: https://downloads.cursor.com/aptrepo
  Suites: stable
  Components: main
  Architectures: amd64,arm64
  Signed-By: /etc/apt/keyrings/cursor.gpg
  EOF
