name: wine
description: Wine Windows compatibility layer
type: apt
install:
  packages:
    - wine
    - wine32
    - wine64
    - libwine
    - libwine:i386
    - fonts-wine
    - wine32-preloader:i386
    - wine64-preloader
    - wine-binfmt
    - mingw-w64
    - q4wine
    - winbind
    - curl
    - winetricks
  postinstall: |
    curl -Lo /usr/local/bin/winetricks \
      https://raw.githubusercontent.com/Winetricks/winetricks/master/src/winetricks
    chmod +x /usr/local/bin/winetricks
remove:
  packages:
    - winetricks
  post_remove: |
    rm -f /usr/local/bin/winetricks
