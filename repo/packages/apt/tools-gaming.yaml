name: tools-gaming
description: Gaming dependencies and tools bundle
type: apt
category: gaming
install:
  packages:
    - fizmo-sdl2
    - libsdl2-2.0-0
    - libsdl2-dev
    - libsdl2-gfx-1.0-0
    - libsdl2-gfx-dev
    - libsdl2-image-2.0-0
    - libsdl2-mixer-2.0-0
    - libsdl2-net-2.0-0
    - scummvm
    - gamemode
    - mangohud
    - mangohud:i386
    - goverlay
  backports:
    - gamescope
remove:
  packages:
    - goverlay
    - gamemode
    - gamescope
    - mangohud
    - mangohud:i386
