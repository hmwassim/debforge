name: spotify
description: Spotify music streaming client
type: apt
install:
  packages:
    - spotify-client
preinstall: |
  curl -fsSL https://download.spotify.com/debian/pubkey_5384CE82BA52C83A.asc \
    | gpg --dearmor --yes -o /etc/apt/trusted.gpg.d/spotify.gpg
  echo "deb https://repository.spotify.com stable non-free" \
    | tee /etc/apt/sources.list.d/spotify.list > /dev/null
post_remove: |
  rm -f /etc/apt/trusted.gpg.d/spotify*
  rm -f /etc/apt/sources.list.d/spotify.list
