name: winetricks
description: Winetricks runtime libraries helper for Wine
type: apt
install:
  packages:
    - curl
    - winetricks
  postinstall: |
    curl -Lo /usr/local/bin/winetricks \
      https://raw.githubusercontent.com/Winetricks/winetricks/master/src/winetricks
    chmod +x /usr/local/bin/winetricks
remove:
  packages:
    - winetricks
  post_remove: |
    rm -f /usr/local/bin/winetricks
