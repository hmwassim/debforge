# NVIDIA kernel module tunables
# Source: CachyOS-Settings (extended)
#
# PAT: better CPU memory management for GPU buffers (faster).
# SkipMemoryZero: don't zero GPU allocations on alloc.
# AggressiveVblank: lower-latency display-interrupt handling.
# DynamicPowerManagement 0x02: allow dGPU idle power-down.
options nvidia NVreg_UsePageAttributeTable=1 \
    NVreg_InitializeSystemMemoryAllocations=0 \
    NVreg_RegistryDwords=RmEnableAggressiveVblank=1 \
    NVreg_DynamicPowerManagement=0x02
