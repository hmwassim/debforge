# ── Virtual Memory ──────────────────────────────────────────────────────────
# With ZRAM (compressed swap in RAM), high swappiness is optimal because
# swapping to compressed memory is far cheaper than OOM kills.
vm.swappiness = 100

# Lower value = kernel keeps VFS (directory/inode) cache longer.
# 50 is a good balance for desktop workloads.
vm.vfs_cache_pressure = 50

# Process starts writeback at 256 MB dirty; background flusher at 64 MB.
vm.dirty_bytes = 268435456
vm.dirty_background_bytes = 67108864

# With ZRAM swap, page-cluster=0 disables readahead on swap (each page is
# independently compressed, so readahead wastes CPU).
vm.page-cluster = 0

# Wake background flusher every 15 s instead of the default 5 s.
vm.dirty_writeback_centisecs = 1500

# ── Kernel ──────────────────────────────────────────────────────────────────
# Auto-group scheduling: ensures interactive desktop sessions get fair CPU
# time even when heavy compile jobs run in background terminals.
kernel.sched_autogroup_enabled = 1

# Disable NMI watchdog — saves power and a performance counter.
kernel.nmi_watchdog = 0

# Quiet kernel console output.
kernel.printk = 3 3 3 3

# Restrict access to kernel pointers in /proc.
kernel.kptr_restrict = 2

# Disable kexec (no hot-reloading the kernel — reduces attack surface).
kernel.kexec_load_disabled = 1

# Disable split-lock mitigation — not a security feature, and it causes
# significant performance regressions in some games and applications.
kernel.split_lock_mitigate = 0

# ── Network ─────────────────────────────────────────────────────────────────
# Increase receive queue for modern high-speed NICs.
net.core.netdev_max_backlog = 16384

# Ignore bogus ICMP error responses.
net.ipv4.icmp_ignore_bogus_error_responses = 1

# Enable TCP Fast Open for both client and server sockets.
net.ipv4.tcp_fastopen = 3

# ── Filesystem ──────────────────────────────────────────────────────────────
# Raise the system-wide file descriptor limit.
fs.file-max = 2097152
