# THP Shrinker — requires kernel 6.12+.
# With THP=always the kernel may overprovision huge pages in sparse regions.
# max_ptes_none=409 means huge pages with >80 % zero-filled PTEs get split,
# keeping memory usage close to madvise levels while retaining THP speed.
# Source: CachyOS-Settings
w! /sys/kernel/mm/transparent_hugepage/khugepaged/max_ptes_none - - - - 409
